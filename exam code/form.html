<!DOCTYPE html>
<html>
    <head>
        <title>Registeration Form</title>
    </head>

    <body>
        <h2>Registeration Form</h2>

        <form action="/register" method="post">
            <fieldset>
                <legend>Personal Details</legend>

                Full Name:<input type="text" name="fullname"><br><br>
                email:<input type="email" name="email"><br><br>
                pass:<input type="password" name="pwd"><br><br>

                gender:
                <input type="radio" name="gender" value="male">Male
                <input type="radio" name="gender" value="female">female
                <br><br>

                Date of Birth:<input type="date" value="dob"><br><br>

                course:
                <select name="course">
                    <option value="bca">BCA</option>
                    <option value="bba">BBA</option>
                </select>
                <br>

                hobbies:
                <input type="checkbox" value="reading" name="hobby">Reading
                <input type="checkbox" value="sport" name="hobby">Sport 
                <br><br>

                adress:<br>
                <textarea name="address" rows="4" cols="15">enter</textarea><br><br>

                <input type="submit" value="Register">
                <input type="reset" value="clear">




           </fieldset>
        </form>
    </body>
</html>
