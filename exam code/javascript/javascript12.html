<!DOCTYPE html>
<html>
    <head>
        <title>dom manipulation</title>
    </head>
    <body>
        <h1>Chapter 10 practice</h1>

        <p id="demo">This is the original text.</p>
        <button onclick="changetext()">Click to change text</button>

        <script>
            function changetext(){
                document.getElementById("demo").innerHTML="the text has changed";
            }
        </script>
    </body>
</html>
