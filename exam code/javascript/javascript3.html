<!DOCTYPE html>
<html>

        <title>Const vs Let</title>

    <body>
        <h1>Chapter 3 practice</h1>

        <script>
            let score=10;
            console.log(score);

            score=20;
            console.log(score);

            console.log(pi);
            
        </script>
    </body>
</html>
